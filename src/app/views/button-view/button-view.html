<div class="view">
  <h1 class="view__title">Botones</h1>

  <!-- ── TIPOS ── -->
  <section class="view__section">
    <h2 class="view__subtitle">Tipos</h2>
    <div class="view__row">
      <app-button type="primario"   label="Primario"   size="desktop" />
      <app-button type="secundario" label="Secundario" size="desktop" />
      <app-button type="exito"      label="Éxito"      size="desktop" />
      <app-button type="alerta"     label="Alerta"     size="desktop" />
      <app-button type="icono"      icon="Icono_add"   size="desktop" />
      <app-button type="usuario"    label="Usuario"    size="desktop" />
    </div>
  </section>

  <!-- ── TAMAÑOS ── -->
  <section class="view__section">
    <h2 class="view__subtitle">Tamaños</h2>
    <div class="view__row view__row--align-end">
      <app-button type="primario" label="Desktop" size="desktop" />
      <app-button type="primario" label="Tablet"  size="tablet" />
      <app-button type="primario" label="Mobile"  size="mobile" />
    </div>
  </section>

  <!-- ── HOVER RESALTADO ── -->
  <section class="view__section">
    <h2 class="view__subtitle">Hover (resaltado)</h2>
    <div class="view__row">
      <app-button type="primario"   label="Primario"   hover="resaltado" size="desktop" />
      <app-button type="secundario" label="Secundario" hover="resaltado" size="desktop" />
      <app-button type="exito"      label="Éxito"      hover="resaltado" size="desktop" />
      <app-button type="alerta"     label="Alerta"     hover="resaltado" size="desktop" />
      <app-button type="icono"      icon="Icono_add"   hover="resaltado" size="desktop" />
      <app-button type="usuario"    label="Usuario"    hover="resaltado" size="desktop" />
    </div>
  </section>

  <!-- ── CON ÍCONO ── -->
  <section class="view__section">
    <h2 class="view__subtitle">Con ícono</h2>
    <div class="view__row">
      <app-button type="primario"   label="Agregar"  [showIcon]="true" icon="Icono_agregar" size="desktop" />
      <app-button type="secundario" label="Notebook" [showIcon]="true" icon="Icono_notebook" size="desktop" />
      <app-button type="exito"      label="Excel"    [showIcon]="true" icon="Icono_excel"   size="desktop" />
      <app-button type="alerta"     label="Eliminar" [showIcon]="true" icon="Icono_trash"   size="desktop" />
      <app-button type="usuario"    label="Perfil"   [showIcon]="true" icon="Vector"        size="desktop" />
    </div>
  </section>

  <!-- ── DESHABILITADO ── -->
  <section class="view__section">
    <h2 class="view__subtitle">Deshabilitado</h2>
    <div class="view__row">
      <app-button type="primario"   label="Primario"   [disabled]="true" size="desktop" />
      <app-button type="secundario" label="Secundario" [disabled]="true" size="desktop" />
      <app-button type="exito"      label="Éxito"      [disabled]="true" size="desktop" />
      <app-button type="alerta"     label="Alerta"     [disabled]="true" size="desktop" />
    </div>
  </section>
</div>

<div class="view">
  <h1 class="view__title">Etiquetas</h1>

  <!-- ── TIPOS ── -->
  <section class="view__section">
    <h2 class="view__subtitle">Tipos</h2>
    <div class="view__row">
      <app-etiqueta estados="clase" porcentaje="value%"></app-etiqueta>
      <app-etiqueta estados="examen" porcentaje="value%"></app-etiqueta>
      <app-etiqueta estados="administrativa" porcentaje="value%"></app-etiqueta>
      <app-etiqueta estados="atraso" porcentaje="value%"></app-etiqueta>
      <app-etiqueta estados="completado" porcentaje="value%"></app-etiqueta>
      <app-etiqueta estados="masDel25" porcentaje="value%"></app-etiqueta>
      <app-etiqueta estados="menosDel25" porcentaje="value%"></app-etiqueta>
    </div>
  </section>
</div>
