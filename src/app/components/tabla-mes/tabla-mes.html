@if (mostrarMolecula) {
  <app-molecula-mes />
}

<div class="tabla-scroll">
<table class="tabla">
  <thead>
    <tr class="tabla__fila tabla__fila--encabezado">
      <th class="tabla__slot tabla__slot--tema-h">
        <app-celdas tipo="Texto" color="Encabezado" tamano="Desktop" texto="TEMA" />
      </th>
      <th class="tabla__slot tabla__slot--hp-h">
        <app-celdas tipo="Texto" color="Encabezado" tamano="Desktop" texto="HP" />
      </th>
      <th class="tabla__slot tabla__slot--hr-h">
        <app-celdas tipo="Texto" color="Encabezado" tamano="Desktop" texto="HR" />
      </th>
      <th class="tabla__slot tabla__slot--mes-h">
        <app-celdas
          tipo="Mes"
          color="Encabezado"
          tamano="Desktop"
          texto="MES"
          (mesAnterior)="onMesAnterior()"
          (mesSiguiente)="onMesSiguiente()" />
      </th>
      <th class="tabla__slot tabla__slot--problemas-h">
        <app-celdas tipo="Texto" color="Encabezado" tamano="Desktop" texto="Problemas" />
      </th>
      <th class="tabla__slot tabla__slot--teoria-h">
        <app-celdas tipo="Texto" color="Encabezado" tamano="Desktop" texto="Teoría" />
      </th>
      <th class="tabla__slot tabla__slot--trabajos-h">
        <app-celdas tipo="Texto" color="Encabezado" tamano="Desktop" texto="Trabajos" />
      </th>
      <th class="tabla__slot tabla__slot--tareas-h">
        <app-celdas tipo="Texto" color="Encabezado" tamano="Desktop" texto="Tareas" />
      </th>
      <th class="tabla__slot tabla__slot--examenes-h">
        <app-celdas tipo="Texto" color="Encabezado" tamano="Desktop" texto="Exámenes" />
      </th>
      <th class="tabla__slot tabla__slot--pct-h">
        <app-celdas tipo="Texto" color="Encabezado" tamano="Desktop" texto="%" />
      </th>
    </tr>
  </thead>
  <tbody>
    @for (fila of filas; track $index; let last = $last) {
      <tr class="tabla__fila" [class.tabla__fila--ultima]="last">
        <td class="tabla__slot tabla__slot--tema">
          <div class="tabla__tema-wrapper">
            <div class="tabla__tema-celda">
              <app-celdas
                tipo="Tema"
                tamano="Desktop"
                [titulo]="fila.titulo"
                [descripcion]="fila.descripcion" />
            </div>
            <app-celdas tipo="Boton" tamano="Desktop" (eliminar)="eliminarTema.emit($index)" />
          </div>
        </td>
        <td class="tabla__slot tabla__slot--hp">
          <app-celdas tipo="Texto" tamano="Desktop" [texto]="textoNum(fila.hp)" />
        </td>
        <td class="tabla__slot tabla__slot--hr">
          <app-celdas tipo="Texto" tamano="Desktop" [texto]="textoNum(fila.hr)" />
        </td>
        <td class="tabla__slot tabla__slot--mes">
          <app-molecula-mes />
        </td>
        <td class="tabla__slot tabla__slot--problemas">
          <app-celdas tipo="Texto" tamano="Desktop" [texto]="textoNum(fila.problemas)" />
        </td>
        <td class="tabla__slot tabla__slot--teoria">
          <app-celdas tipo="Texto" tamano="Desktop" [texto]="textoNum(fila.teoria)" />
        </td>
        <td class="tabla__slot tabla__slot--trabajos">
          <app-celdas tipo="Texto" tamano="Desktop" [texto]="textoNum(fila.trabajos)" />
        </td>
        <td class="tabla__slot tabla__slot--tareas">
          <app-celdas tipo="Texto" tamano="Desktop" [texto]="textoNum(fila.tareas)" />
        </td>
        <td class="tabla__slot tabla__slot--examenes">
          <app-celdas tipo="Texto" tamano="Desktop" [texto]="textoNum(fila.examenes)" />
        </td>
        <td class="tabla__slot tabla__slot--pct">
          <app-celdas tipo="Texto" tamano="Desktop" [texto]="textoPorcentaje(fila.porcentaje)" />
        </td>
      </tr>
    }
  </tbody>
</table>
</div>
