<div class="card-showcase">
  @for (tamano of tamanos; track tamano) {
    <section class="card-showcase__grupo">
      <h3 class="card-showcase__tamano">{{ tamano }}</h3>
      <div class="card-showcase__grid">
        @for (v of variantes; track v.tipo) {
          <app-card
            [tipo]="v.tipo"
            [tamano]="tamano"
            [titulo]="v.titulo ?? ''"
            [subtitulo]="v.subtitulo ?? ''"
            [etiqueta]="v.tipo === 'backlog' || v.tipo === 'backlogCard' ? etiquetaBacklogCard : null"
            [etiquetas]="v.tipo === 'Leyenda' ? [] : []"
            [mostrarDropdown]="v.tipo === 'Principal' && tamano !== 'Desktop'"
            [dropdownLabel]="tamano === 'mobile' ? 'Seleccionar 3' : 'Seleccionar 2'"
            [botones]="v.tipo === 'TablaCard' ? botonesExportar : []"
            [lineasTexto]="v.tipo === 'texto' ? lineasTexto(tamano) : []"
            [mostrarBusqueda]="false" />
        }
      </div>
    </section>
  }
</div>
