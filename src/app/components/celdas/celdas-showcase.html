<div class="celdas-showcase">
  @for (tamano of tamanos; track tamano) {
    <div class="celdas-showcase__fila">
      @for (variante of variantes; track variante.tipo + variante.color) {
        <app-celdas
          [tipo]="variante.tipo"
          [color]="variante.color"
          [tamano]="tamano"
          [texto]="variante.tipo === 'Mes' ? 'Mes' : 'Texto'" />
      }
    </div>
  }
</div>
