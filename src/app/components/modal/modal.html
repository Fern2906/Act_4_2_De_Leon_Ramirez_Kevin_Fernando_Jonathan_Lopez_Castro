@if (visible || inline) {
  <div
    class="modal-backdrop"
    [class.modal-backdrop--inline]="inline"
    (click)="onBackdropClick()">
    <div [class]="clasePanel()" (click)="$event.stopPropagation()">
      <header class="modal__header">
        <div class="modal__header-bar" aria-hidden="true"></div>
        <div class="modal__header-content">
          <app-icon [name]="iconoHeader" [size]="20" />
          <h2 class="modal__titulo">{{ titulo }}</h2>
        </div>
      </header>

      <div class="modal__body">
        <ng-content />
      </div>

      <footer class="modal__footer">
        @for (btn of botones; track $index) {
          <app-button
            [label]="btn.label"
            [type]="btn.type ?? 'secundario'"
            [size]="tamanoBoton()"
            [icon]="btn.icon ?? (btn.type === 'primario' ? 'Icono_agregar' : 'Icono_add')"
            [showIcon]="true"
            (click)="accion.emit(btn.label)" />
        }
      </footer>
    </div>
  </div>
}
