@if (visible) {
  <div class="modal-backdrop" (click)="onCerrar()">
    <div class="modal" (click)="$event.stopPropagation()">

      <!-- Cabecera -->
      <div class="modal__header">
        <div class="modal__header-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="var(--primary-blue)" stroke-width="2"/>
            <line x1="12" y1="7" x2="12" y2="17" stroke="var(--primary-blue)" stroke-width="2" stroke-linecap="round"/>
            <line x1="7" y1="12" x2="17" y2="12" stroke="var(--primary-blue)" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="modal__titulo">{{ titulo }}</span>
      </div>

      <!-- Cuerpo: campos proyectados desde el padre -->
      <div class="modal__body">
        <ng-content />
      </div>

      <!-- Pie -->
      <div class="modal__footer">
        @for (btn of botones; track $index) {
          <app-button [label]="btn.label" [type]="btn.type ?? 'secundario'" size="desktop" />
        }
      </div>

    </div>
  </div>
}
